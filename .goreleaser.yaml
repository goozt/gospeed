version: 2

builds:
  - id: gospeed
    main: ./cmd/gospeed
    binary: gospeed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: "386"
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/goozt/gospeed/internal/version.Version={{.Version}}
      - -X github.com/goozt/gospeed/internal/version.Commit={{.ShortCommit}}
      - -X github.com/goozt/gospeed/internal/version.Date={{.Date}}

  - id: gospeed-server
    main: ./cmd/gospeed-server
    binary: gospeed-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: "386"
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/goozt/gospeed/internal/version.Version={{.Version}}
      - -X github.com/goozt/gospeed/internal/version.Commit={{.ShortCommit}}
      - -X github.com/goozt/gospeed/internal/version.Date={{.Date}}

archives:
  - id: gospeed
    ids:
      - gospeed
    name_template: "gospeed_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: gospeed-server
    ids:
      - gospeed-server
    name_template: "gospeed-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - ids:
      - gospeed
    name: gospeed
    repository:
      owner: goozt
      name: homebrew-org
    directory: Casks
    homepage: https://gospeed.goozt.org
    description: Fast, zero-dependency network speed testing tool
    license: MIT

  - ids:
      - gospeed-server
    name: gospeed-server
    repository:
      owner: goozt
      name: homebrew-org
    directory: Casks
    homepage: https://gospeed.goozt.org
    description: Speed test server for gospeed
    license: MIT

scoops:
  - ids:
      - gospeed
    repository:
      owner: goozt
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://gospeed.goozt.org
    description: Fast, zero-dependency network speed testing tool
    license: MIT

  - ids:
      - gospeed-server
    repository:
      owner: goozt
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://gospeed.goozt.org
    description: Speed test server for gospeed
    license: MIT

nfpms:
  - id: gospeed-nfpm
    ids:
      - gospeed
    package_name: gospeed
    homepage: https://gospeed.goozt.org
    maintainer: goozt <goozt@users.noreply.github.com>
    description: Fast, zero-dependency network speed testing tool
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    file_name_template: >-
      {{- trimsuffix .ConventionalFileName .ConventionalExtension -}}
      {{- if and (eq .Arm "6") (eq .ConventionalExtension ".deb") }}6{{ end -}}
      {{- if not (eq .Amd64 "v1")}}{{ .Amd64 }}{{ end -}}
      {{- .ConventionalExtension -}}

  - id: gospeed-server-nfpm
    ids:
      - gospeed-server
    package_name: gospeed-server
    homepage: https://gospeed.goozt.org
    maintainer: goozt <goozt@users.noreply.github.com>
    description: Speed test server for gospeed
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    file_name_template: >-
      {{- trimsuffix .ConventionalFileName .ConventionalExtension -}}
      {{- if and (eq .Arm "6") (eq .ConventionalExtension ".deb") }}6{{ end -}}
      {{- if not (eq .Amd64 "v1")}}{{ .Amd64 }}{{ end -}}
      {{- .ConventionalExtension -}}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

signs:
  - id: gospeed-sig
    cmd: cosign
    artifacts: all
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"