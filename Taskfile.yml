version: "3"

vars:
  VERSION: '{{default "dev" .VERSION}}'
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -s -w
    -X github.com/goozt/gospeed/internal/version.Version={{.VERSION}}
    -X github.com/goozt/gospeed/internal/version.Commit={{.COMMIT}}
    -X github.com/goozt/gospeed/internal/version.Date={{.DATE}}

tasks:
  build:
    desc: Build both binaries
    cmds:
      - go build -trimpath -ldflags="{{.LDFLAGS}}" -o bin/gospeed ./cmd/gospeed
      - go build -trimpath -ldflags="{{.LDFLAGS}}" -o bin/gospeed-server ./cmd/gospeed-server

  build-linux:
    desc: Build Linux binaries
    cmds:
      - GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="{{.LDFLAGS}}" -o bin/gospeed ./cmd/gospeed
      - GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="{{.LDFLAGS}}" -o bin/gospeed-server ./cmd/gospeed-server

  test:
    desc: Run tests
    cmds:
      - go test -timeout 120s ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Lint (runs vet)
    deps: [vet]

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/

  docker:
    desc: Build Docker image
    cmds:
      - docker build -t gospeed-server .

  dev-init:
    desc: Initialize development environment
    cmds:
      - go mod tidy
      - go install github.com/gordonklaus/ineffassign@latest
      - go install github.com/client9/misspell/cmd/misspell@latest
      - go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
      - go install github.com/go-task/task/v3/cmd/task@latest
      - go install github.com/goreleaser/goreleaser/v2@latest

  bump-ready:
    desc: Check if code is ready for version bump
    deps:
      - vet
      - test
      - build
    cmds:
      - gofmt -l -s .
      - gocyclo -over 15 ./...
      - ineffassign ./...
      - misspell -error .

  bump:
    desc: Bump version (e.g. "patch", "minor", "major")
    cmds:
      - git tag -a v{{.VERSION}} -m "Release v{{.VERSION}}"
      - git push origin v{{.VERSION}}

  release-snapshot:
    desc: Test GoReleaser locally
    cmds:
      - goreleaser release --snapshot --clean

  npm-publish:
    desc: Publish npm packages
    deps:
      - release-snapshot
    cmds:
      - bash scripts/npm-packages.sh
      - bash scripts/npm-publish.sh