name: Release

on:
  push:
    tags:
      - "v*"
  
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      gh_release_exists: ${{ steps.check_api.outputs.exists }}
      npm_exists: ${{ steps.check-npm.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release
        id: check_api
        uses: ./.github/actions/check-release

      - name: Check npm package exists
        id: check-npm
        uses: ./.github/actions/check-npm
        with:
          npm_token: ${{ secrets.NPM_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean ${{ steps.check_api.outputs.exists == 'true' && '--skip-publish --skip-announce' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.PACKAGE_PUBLISHING_TOKEN }}
          SCOOPS_GITHUB_TOKEN: ${{ secrets.PACKAGE_PUBLISHING_TOKEN }}
      
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist
          retention-days: 1

  npm-publish:
    needs: release
    if: needs.release.outputs.npm_exists == 'false'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist from GoReleaser
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Generate npm packages
        run: bash scripts/npm-packages.sh -y

      - name: Publish platform packages
        run: |
          shopt -s nullglob
          for dir in dist/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --provenance --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root packages
        run: |
          cp README.md scripts/gospeed/README.md
          cp README.md scripts/gospeed-server/README.md
          npm publish scripts/gospeed --provenance --access public
          npm publish scripts/gospeed-server --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
