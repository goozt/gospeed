name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release
        id: check_api
        uses: ./.github/actions/check-release

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Install Nix
        # GoReleaser's `nix` publisher shells out to `nix-hash` to compute the
        # source SHA256 in the NUR derivation. Without it the pipe skips with
        # "nix-hash is not available".
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean ${{ steps.check_api.outputs.exists == 'true' && '--skip=publish --skip=announce' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.PACKAGE_PUBLISHING_TOKEN }}
          SCOOPS_GITHUB_TOKEN: ${{ secrets.PACKAGE_PUBLISHING_TOKEN }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          NIX_TAP_GITHUB_TOKEN: ${{ secrets.NIX_TAP_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
