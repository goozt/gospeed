name: Release

on:
  push:
    tags:
      - "v*"
  
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist
          retention-days: 1

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist from GoReleaser
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Generate npm packages
        run: bash scripts/npm-packages.sh -y

      - name: Publish platform packages
        run: |
          shopt -s nullglob
          for dir in dist/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --provenance --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root packages
        run: |
          cp README.md scripts/gospeed/README.md
          cp README.md scripts/gospeed-server/README.md
          npm publish scripts/gospeed --provenance --access public
          npm publish scripts/gospeed-server --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
