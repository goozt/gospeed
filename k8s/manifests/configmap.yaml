apiVersion: v1
kind: ConfigMap
metadata:
  name: gospeed-server
  namespace: gospeed
  labels:
    app.kubernetes.io/name: gospeed
    app.kubernetes.io/component: server
data:
  PORT: "9000"
  HEALTH_PORT: "8080"
  # TLS configuration (uncomment as needed)
  # TLS_MODE: "self-signed"        # Options: self-signed, manual, acme
  # TLS_CERT: "/tls/tls.crt"      # For manual TLS
  # TLS_KEY: "/tls/tls.key"        # For manual TLS
  # TLS_DOMAIN: "speed.example.com" # For ACME
  # TLS_EMAIL: "admin@example.com"  # For ACME
  # CERT_DIR: "/certs"              # For ACME cert cache
