apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gospeed-server
  namespace: gospeed
  labels:
    app.kubernetes.io/name: gospeed
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gospeed-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
