replicaCount: 2

image:
  repository: gospeed-server
  tag: latest
  pullPolicy: IfNotPresent

server:
  port: 9000

health:
  enabled: true
  port: 8080

tls:
  enabled: false
  # mode: self-signed | manual | acme
  mode: ""
  # For manual TLS
  cert: ""
  key: ""
  # For ACME
  domain: ""
  email: ""
  certDir: /certs

service:
  type: ClusterIP

ingress:
  enabled: false
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - speed.example.com
  tls: []
  #  - secretName: gospeed-tls
  #    hosts:
  #      - speed.example.com

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

gomaxprocs: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 128Mi

networkPolicy:
  enabled: false

persistence:
  enabled: false
  size: 1Gi
  # storageClass: ""
