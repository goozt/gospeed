{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gospeed.fullname" . }}
  labels:
    {{- include "gospeed.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gospeed.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.server.port }}
          protocol: TCP
        - port: {{ .Values.server.port }}
          protocol: UDP
        {{- if .Values.health.enabled }}
        - port: {{ .Values.health.port }}
          protocol: TCP
        {{- end }}
      {{- if .Values.ingress.enabled }}
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if and .Values.tls.enabled (eq .Values.tls.mode "acme") }}
    # Allow HTTPS outbound for ACME certificate renewal
    - ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- end }}
