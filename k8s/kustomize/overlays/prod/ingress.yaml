apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gospeed-server
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "TCP"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: speed.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gospeed-server-tcp
                port:
                  number: 9000
