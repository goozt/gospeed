apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gospeed

resources:
  - ../../base
  - hpa.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - pvc.yaml

patches:
  - target:
      kind: Deployment
      name: gospeed-server
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
