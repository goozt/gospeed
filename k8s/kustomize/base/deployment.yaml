apiVersion: apps/v1
kind: Deployment
metadata:
  name: gospeed-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gospeed
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gospeed
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: gospeed-server
          image: gospeed-server:latest
          args:
            - "--port"
            - "9000"
            - "--health"
            - "8080"
          ports:
            - name: server-tcp
              containerPort: 9000
              protocol: TCP
            - name: server-udp
              containerPort: 9000
              protocol: UDP
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: GOMAXPROCS
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
